{% extends 'portal/base.html' %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm border-0 mt-5">
        <div class="card-body p-5">
            <h3 class="fw-bold text-navy mb-4">Create Drive - Step 2</h3>
            <div class="progress mb-4" style="height: 5px;">
                <div class="progress-bar" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <p class="text-muted">Select applicable branches for <strong>{{ drive.drive_name }}</strong></p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.branches }}
                    {% if form.branches.errors %}
                        <div class="text-danger mt-1">{{ form.branches.errors }}</div>
                    {% endif %}
                </div>
                <div class="text-end mt-4">
                    <button type="submit" class="btn btn-success"><i class="fa fa-check me-2"></i> Finish Creation</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
