<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 2rem;
            text-align: center;
            color: #fff;
        }
        .login-header h2 { font-weight: 700; margin-bottom: 0.25rem; }
        .login-header p { opacity: 0.7; font-size: 0.9rem; margin: 0; }
        .login-body { padding: 2rem; }
        .form-control:focus { border-color: #0f3460; box-shadow: 0 0 0 0.2rem rgba(15,52,96,.2); }
        .btn-login {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border: none; color: #fff; width: 100%; padding: 0.75rem;
            border-radius: 8px; font-weight: 600; font-size: 1rem;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: 0.9; color: #fff; }
        .input-group-text { background: #f8f9fa; }
        .forgot-link { color: #0f3460; text-decoration: none; font-size: 0.875rem; }
        .forgot-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fa fa-graduation-cap fa-2x mb-2"></i>
            <h2>Placement Portal</h2>
            <p>Admin Sign In</p>
        </div>
        <div class="login-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username or Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-user text-secondary"></i></span>
                        <input type="text" name="identifier" class="form-control"
                               placeholder="Enter username or email" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-lock text-secondary"></i></span>
                        <input type="password" name="password" id="passwordInput" class="form-control"
                               placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePw()">
                            <i class="fa fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="d-flex justify-content-end mb-3">
                    <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="fa fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePw() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
