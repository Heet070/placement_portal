<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-wrap {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .card-header-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 2rem;
            text-align: center;
            color: #fff;
        }
        .card-header-custom h2 { font-weight: 700; margin-bottom: 0.25rem; }
        .card-header-custom p { opacity: 0.7; font-size: 0.9rem; margin: 0; }
        .card-body-custom { padding: 2rem; }
        .form-control:focus { border-color: #0f3460; box-shadow: 0 0 0 0.2rem rgba(15,52,96,.2); }
        .btn-primary-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border: none; color: #fff; width: 100%; padding: 0.75rem;
            border-radius: 8px; font-weight: 600; font-size: 1rem;
        }
        .btn-primary-custom:hover { opacity: 0.9; color: #fff; }
    </style>
</head>
<body>
    <div class="card-wrap">
        <div class="card-header-custom">
            <i class="fa fa-key fa-2x mb-2"></i>
            <h2>Forgot Password</h2>
            <p>We'll send a reset link to your email</p>
        </div>
        <div class="card-body-custom">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Registered Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-envelope text-secondary"></i></span>
                        <input type="email" name="email" class="form-control"
                               placeholder="admin@example.com" required autofocus>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom mb-3">
                    <i class="fa fa-paper-plane me-2"></i>Send Reset Link
                </button>
                <div class="text-center">
                    <a href="{% url 'admin_login' %}" class="text-secondary text-decoration-none small">
                        <i class="fa fa-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
