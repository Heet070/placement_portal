<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-wrap {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .card-header-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 2rem;
            text-align: center;
            color: #fff;
        }
        .card-header-custom h2 { font-weight: 700; margin-bottom: 0.25rem; }
        .card-header-custom p { opacity: 0.7; font-size: 0.9rem; margin: 0; }
        .card-body-custom { padding: 2rem; }
        .form-control:focus { border-color: #0f3460; box-shadow: 0 0 0 0.2rem rgba(15,52,96,.2); }
        .btn-primary-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border: none; color: #fff; width: 100%; padding: 0.75rem;
            border-radius: 8px; font-weight: 600; font-size: 1rem;
        }
        .btn-primary-custom:hover { opacity: 0.9; color: #fff; }
        .strength-bar { height: 4px; border-radius: 2px; transition: all .3s; background: #e9ecef; }
        .strength-bar.weak { background: #dc3545; width: 33%; }
        .strength-bar.medium { background: #ffc107; width: 66%; }
        .strength-bar.strong { background: #28a745; width: 100%; }
    </style>
</head>
<body>
    <div class="card-wrap">
        <div class="card-header-custom">
            <i class="fa fa-shield-halved fa-2x mb-2"></i>
            <h2>Reset Password</h2>
            <p>Create a strong new password</p>
        </div>
        <div class="card-body-custom">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-lock text-secondary"></i></span>
                        <input type="password" name="new_password" id="newPw" class="form-control"
                               placeholder="Minimum 8 characters" required oninput="checkStrength(this.value)">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePw('newPw','eye1')">
                            <i class="fa fa-eye" id="eye1"></i>
                        </button>
                    </div>
                    <div class="strength-bar mt-1" id="strengthBar"></div>
                    <small class="text-muted" id="strengthText"></small>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-lock text-secondary"></i></span>
                        <input type="password" name="confirm_password" id="confirmPw" class="form-control"
                               placeholder="Re-enter new password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePw('confirmPw','eye2')">
                            <i class="fa fa-eye" id="eye2"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom mb-3">
                    <i class="fa fa-check me-2"></i>Reset Password
                </button>
                <div class="text-center">
                    <a href="{% url 'admin_login' %}" class="text-secondary text-decoration-none small">
                        <i class="fa fa-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        function checkStrength(pw) {
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            bar.className = 'strength-bar mt-1';
            if (!pw) { txt.textContent = ''; return; }
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            if (score <= 1) { bar.classList.add('weak'); txt.textContent = 'Weak'; }
            else if (score <= 2) { bar.classList.add('medium'); txt.textContent = 'Medium'; }
            else { bar.classList.add('strong'); txt.textContent = 'Strong'; }
        }
    </script>
</body>
</html>
